<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meyer Road Real Estate Research Portal</title>
    <style>
        :root {
            --primary-color: #1a2a6c;
            --secondary-color: #b21f1f;
            --text-color: #333;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .portal-card {
            max-width: 600px;
            width: 90%;
            background: #fff;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            border-radius: 12px;
            text-align: center;
        }
        header {
            margin-bottom: 30px;
        }
        .logo-placeholder {
            width: 80px;
            height: 80px;
            background: var(--primary-color);
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2em;
            font-weight: bold;
        }
        h1 { color: var(--primary-color); margin: 10px 0; font-size: 1.8em; }
        p { color: #666; margin-bottom: 30px; }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .report-link {
            display: block;
            padding: 15px 25px;
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 8px;
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .report-link:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26,42,108,0.2);
        }
        .report-link .lang {
            font-size: 0.8em;
            opacity: 0.7;
            text-transform: uppercase;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.8em;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="portal-card">
        <header>
            <div class="logo-placeholder">RE</div>
            <h1>Investment Research Portal</h1>
            <p>Meyer Road Corridor (D15) - Singapore</p>
        </header>

        <div class="links-container">
            <a href="shareable_report_en.html" class="report-link">
                <span>View Executive Report</span>
                <span class="lang">English</span>
            </a>
            <a href="shareable_report_zh.html" class="report-link">
                <span>查看執行研究報告</span>
                <span class="lang">繁體中文</span>
            </a>
        </div>

        <div class="footer">
            <p>Confidential Agent Report &copy; 2026<br>
            Optimized for Cloudflare Pages Deployment</p>
        </div>
    </div>
</body>
</html>
