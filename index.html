<!DOCTYPE html>

<head>

    <title>大將開發 | 市場調查</title>
    <style>
        :root {
            --primary-color: #1a2a6c;
            --secondary-color: #b21f1f;
            --accent-color: #fdbb2d;
            --text-color: #333;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header-image {
            width: 100%;
            height: 300px;
            background-image: url('https://images.unsplash.com/photo-1522810358482-628d0979d38c?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 800px;
            width: 90%;
            margin-top: -50px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .logo-text {
            font-weight: 900;
            font-size: 1.8em;
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        .subtitle {
            font-size: 1.4em;
            color: var(--secondary-color);
            margin-bottom: 40px;
            font-weight: 600;
        }
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .nav-btn {
            display: block;
            background: var(--primary-color);
            color: white;
            padding: 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }
        .nav-btn:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }
        .footer {
            margin-top: auto;
            padding: 40px;
            color: #999;
            font-size: 0.85em;
        }
    </style>
</head>
<body>

    <div class="header-image"></div>
