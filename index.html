<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大將開發 | 房地產市場調查報告</title>
    <style>
        :root {
            --primary-color: #1a2a6c;
            --secondary-color: #b21f1f;
            --accent-color: #fdbb2d;
            --text-color: #333;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header-image {
            width: 100%;
            height: 250px;
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&amp;w=1600&amp;auto=format&amp;fit=crop');
            background-size: cover;
            background-position: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 1000px;
            width: 90%;
            margin-top: -60px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            margin-bottom: 50px;
        }
        .logo-text {
            font-weight: 900;
            font-size: 2em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 1.2em;
            color: var(--secondary-color);
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* 3-Column Layout */
        .market-grid {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }
        .market-column {
            flex: 1;
            min-width: 250px;
            background: #f9f9f9;
            padding: 25px;
            border-radius: 10px;
            border-top: 5px solid var(--primary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }
        .market-column:hover {
            transform: translateY(-5px);
        }
        .flag-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        .market-title {
            font-size: 1.4em;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
        }
        .link-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        .nav-btn {
            display: block;
            background: white;
            color: var(--primary-color);
            padding: 12px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95em;
            border: 1px solid #ddd;
            transition: all 0.3s ease;
        }
        .nav-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .btn-manual {
            color: var(--secondary-color);
            border-color: var(--secondary-color);
        }
        .btn-manual:hover {
            background: var(--secondary-color);
            color: white;
        }

        .footer {
            margin-top: auto;
            padding: 40px;
            color: #999;
            font-size: 0.85em;
            text-align: center;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .market-grid {
                flex-direction: column;
            }
            .market-column {
                width: 100%;
                min-width: unset;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <div class="header-image"></div>

    <div class="container">
        <div class="logo-text">大將開發 | 房地產市場調查報告</div>
        <div class="subtitle">GLOBAL REAL ESTATE RESEARCH DIRECTORY</div>

        <div class="market-grid">
            <!-- Houston -->
            <div class="market-column" style="border-top-color: #3C3B6E;">
                <div class="flag-icon">🇺🇸</div>
                <div class="market-title">休士頓 (Houston)<br>Bellaire &amp; West U 區域</div>
                <div class="link-group">
                    <a href="https://tinyurl.com/jp3v3zjd" class="nav-btn btn-manual" target="_blank">市場成交對照 (HAR Map)</a>
                </div>
            </div>

            <!-- Singapore -->
            <div class="market-column" style="border-top-color: #EF3340;">
                <div class="flag-icon">🇸🇬</div>
                <div class="market-title">新加坡<br>D15 Marine Parade</div>
                <div class="link-group">
                    <a href="sg/comps.html" class="nav-btn">建案數據對照表</a>
                    <a href="sg/executive_summary_zh.html" class="nav-btn">市場研究報告</a>
                </div>
            </div>

            <!-- Kuala Lumpur -->
            <div class="market-column" style="border-top-color: #010066;">
                <div class="flag-icon">🇲🇾</div>
                <div class="market-title">馬來西亞<br>TRX (敦拉薩國際貿易中心)</div>
                <div class="link-group">
                    <a href="kl/trx_details.html" class="nav-btn">建案數據對照表</a>
                    <a href="kl/executive_summary_zh.html" class="nav-btn">市場研究報告</a>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
    </div>

</body>
</html>
